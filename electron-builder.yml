appId: com.atfimemnu.app
productName: Atf-I Memnu
directories:
  output: dist
  buildResources: resources
files:
  - out/**
  - package.json
asar: true
extraResources:
  - from: backend/dist/atfi-memnu-backend
    to: backend
    filter:
      - '**/*'
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: temasictfic
  repo: Atf-I-Memnu
